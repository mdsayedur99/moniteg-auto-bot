<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Monetag Auto Method + Points</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{margin:0;font-family:Arial;background:#111;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#222;padding:20px;border-radius:16px;width:340px;text-align:center}
button{padding:10px 14px;margin:5px;border:none;border-radius:10px;cursor:pointer}
#points{color:#ffd700;font-weight:bold}
</style>
</head>
<body>
<div class="card">
<h2>🚀 Monetag Auto Method</h2>

<div>
<img id="tgPhoto" src="https://i.imgur.com/6VBx3io.png" width="50" style="border-radius:50%"><br>
<span id="tgName">Telegram User</span>
</div>

<h3>⭐ Points: <span id="points">0</span></h3>

<button onclick="enableAuto()">Auto Method ON</button>
<button onclick="enableManual()">Manual ON</button>

<p id="timerBox" style="display:none">Next Ads in <span id="countdown">18</span>s</p>
<div id="watchAdsBox" style="display:none">
<button onclick="showAdInstant()">🎬 Watch Ads</button>
</div>
</div>

<script src="//libtl.com/sdk.js"
data-zone="11137768"
data-sdk="show_11137768"></script>

<script>
const tg=window.Telegram.WebApp;
tg.ready();

if(tg.initDataUnsafe?.user){
 const u=tg.initDataUnsafe.user;
 document.getElementById("tgName").innerText=u.first_name+(u.last_name?" "+u.last_name:"");
 if(u.photo_url) document.getElementById("tgPhoto").src=u.photo_url;
}

let points=Number(localStorage.getItem("points"))||0;
document.getElementById("points").textContent=points;

function addPoint(n=1){
 points+=n;
 localStorage.setItem("points",points);
 document.getElementById("points").textContent=points;
}

let timerInterval,timeLeft=18;

async function showAdInstant(){
 if(typeof show_11137768==="function"){
   try{
     await show_11137768();
     addPoint(1);
   }catch(e){}
 }
}

function startAutoTimer(){
 clearInterval(timerInterval);
 timeLeft=18;
 document.getElementById("timerBox").style.display="block";
 document.getElementById("countdown").textContent=timeLeft;
 timerInterval=setInterval(()=>{
   timeLeft--;
   document.getElementById("countdown").textContent=timeLeft;
   if(timeLeft<=0){
      clearInterval(timerInterval);
      location.reload();
   }
 },1000);
}

function enableAuto(){
 localStorage.setItem("adMode","auto");
 document.getElementById("watchAdsBox").style.display="none";
 showAdInstant();
 startAutoTimer();
}

function enableManual(){
 localStorage.setItem("adMode","manual");
 clearInterval(timerInterval);
 document.getElementById("timerBox").style.display="none";
 document.getElementById("watchAdsBox").style.display="block";
}

window.addEventListener("load",()=>{
 if(localStorage.getItem("adMode")==="auto"){
   showAdInstant();
   startAutoTimer();
 }
});
</script>
</body>
</html>
